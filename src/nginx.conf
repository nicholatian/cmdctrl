# /etc/nginx/nginx.conf

user nginx;
worker_processes auto;
pcre_jit on;

error_log /var/log/nginx/error.log info;

events
{
	# The maximum number of simultaneous connections that can be
	# opened by a worker process.
	worker_connections 1024;
}

http
{
	# Includes mapping of file name extensions to MIME types of
	# responses and defines the default type.
	include /etc/nginx/mime.types;
	default_type application/octet-stream;

	# Don't tell nginx version to the clients. Default is 'on'.
	server_tokens off;

	# Specifies the maximum accepted body size of a client request,
	# as indicated by the request header Content-Length. If the
	# stated content length is greater than this size, then the
	# client receives the HTTP error code 413. Set to 0 to disable.
	# Default is '1m'.
	client_max_body_size 137438953472;

	# Sendfile copies data between one FD and other from within the
	# kernel, which is more efficient than read() + write(). Default
	# is off.
	sendfile on;

	# Causes nginx to attempt to send its HTTP response head in one
	# packet, instead of using partial frames. Default is 'off'.
	tcp_nopush on;

	# Enable gzipping of responses.
	#gzip on;

	# Set the Vary HTTP header as defined in the RFC 2616. Default
	# is 'off'.
	gzip_vary on;

	# Helper variable for proxying websockets.
	map $http_upgrade $connection_upgrade
	{
		default upgrade;
		'' close;
	}

	# Specifies the main log format.
	log_format main '$remote_addr - $remote_user [$time_local] '
			'"$request" $status $body_bytes_sent '
			'"$http_referer" "$http_user_agent" '
			'"$http_x_forwarded_for"';

	# Sets the path, format, and configuration for a buffered log
	# write.
	access_log /var/log/nginx/access.log main;

	# Includes website configs.
	include /etc/nginx/enabled/*.conf;
}
