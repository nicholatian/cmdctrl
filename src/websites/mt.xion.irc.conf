##
## "IRC.XION.MT"
## XionIRC web chat landing page
##

server
{
	include /etc/nginx/sitebits.conf;
	ssl_certificate /etc/letsencrypt/live/irc.xion.mt/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/irc.xion.mt/privkey.pem;
	server_name irc.xion.mt;
	gzip on;

	root /var/lib/nginx/public/mt.xion.irc;
}

server
{
	server_name irc.xion.mt;
	include /etc/nginx/ssl-redirect.conf;
}
