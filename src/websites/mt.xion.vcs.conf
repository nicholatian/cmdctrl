##
## "VCS.XION.MT"
## XionVCS source code management frontend
##

server
{
	include /etc/nginx/sitebits.conf;
	ssl_certificate /etc/letsencrypt/live/vcs.xion.mt/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/vcs.xion.mt/privkey.pem;
	server_name vcs.xion.mt;
	gzip on;

	root /var/lib/nginx/public/mt.xion.vcs;
}

server
{
	server_name vcs.xion.mt;
	include /etc/nginx/ssl-redirect.conf;
}
