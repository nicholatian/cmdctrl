##
## "OMB.XION.MT"
## XionOMB tweet propagation
##

server
{
	include /etc/nginx/sitebits.conf;
	ssl_certificate /etc/letsencrypt/live/omb.xion.mt/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/omb.xion.mt/privkey.pem;
	server_name omb.xion.mt;
	gzip on;

	root /var/lib/nginx/public/mt.xion.omb;
}

server
{
	server_name omb.xion.mt;
	include /etc/nginx/ssl-redirect.conf;
}
