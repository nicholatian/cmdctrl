<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="content-type" content="text/html;charset=utf-8" />
<meta http-equiv="X-UA-Compatible" content="IE=Edge" />
<meta name="viewport"
content="width=device-width,initial-scale=1,user-scalable=1" />
<meta name="HandheldFriendly" content="true" />
<title>Not Found</title>
<meta property="og:locale" content="en_US" />
<meta name="robots" content="noindex" />
<style>
@font-face
{
	font-family: 'Fira Sans';
	font-style: normal;
	font-weight: 400;
	font-display: swap;
	src: url('https://cdn.tohoku.ac/firasan4.woff');
}

@font-face
{
	font-family: 'Fira Sans';
	font-style: normal;
	font-weight: 700;
	font-display: swap;
	src: url('https://cdn.tohoku.ac/firasan7.woff');
}

*,
*::before,
*::after
{
	box-sizing: border-box;
}

[tabindex="-1"]:focus:not(:focus-visible)
{
	outline: 0 !important;
}

html
{
	font-family:
		'Fira Sans'
		'Segoe UI',
		'Candara',
		'Bitstream Vera Sans',
		'DejaVu Sans',
		'Bitstream Vera Sans',
		'Trebuchet MS',
		'Verdana',
		'Verdana Ref',
		sans-serif;
	line-height: 1.125;
	tab-size: 8;
}

body
{
	margin: 0;
	padding: 0;
	font-size: 13px;
	font-weight: 400;
	text-align: left;
	background-color: #111;
	background-size: cover;
	background-repeat: no-repeat;
	background-position-x: center;
	background-position-y: center;
	background-attachment: fixed;
	color: #eee;
}

div.main
{
	background-color: rgba(255, 255, 255, 0.8125);
	color: #111;
	margin: 0 auto;
	overflow: auto;
	text-align: center;
}

div.footer
{
	margin: 10px auto 20px;
	text-align: center;
}

div.footer > p.copyright
{
	font-weight: 700;
}

p.status-code
{
	font-size: 120px;
	font-weight: 700;
}

h1
{
	font-size: 30px;
	padding-bottom: 5px;
	padding-left: 5px;
}

@media (max-width: 799.98px)
{
	div.main
	{
		width: 100vw;
	}

	div.footer
	{
		width: 50vw;
	}
}

@media (min-width: 800px)
{
	div.main
	{
		width: 780px;
	}

	div.footer
	{
		width: 390px;
	}
}
</style>
</head>
<body>
<div class="main">
<p class="status-code">404</p>
<h1>Not Found</h1>
<p>The page you are looking for does not exist or has been moved.</p>
</div>
<div class="footer">
<p class="copyright">Copyright &copy; 2024&ndash;2026 Xion Megatrends
LLC.</p>
</div>
</body>
</html>
