<!DOCTYPE html>

<style>

	font-display: swap;
	src: url('https://cdn.tohoku.ac/firasan4.woff');
}

@font-face
{
	font-family: 'Fira Sans';
	font-style: normal;
	font-weight: 700;
	font-display: swap;
	src: url('https://cdn.tohoku.ac/firasan7.woff');
}

@font-face
{
	font-family: 'Fira Mono';
	font-style: normal;
	font-weight: 700;
	font-display: swap;
	src: url('https://cdn.tohoku.ac/firamonb.woff');
}

@font-face
{
	font-family: 'Roboto Slab';
	font-style: normal;
	font-weight: 500;

	src: url('https://cdn.tohoku.ac/robotosl.woff');
}

*,
*::before,
*::after
{

}

{

html
{

}

body
{
	margin: 0;
	padding: 0;
	font-size: 13px;
	font-weight: 400;
	text-align: left;
	background-color: #111;
	background-size: cover;
	background-repeat: no-repeat;
	background-position-x: center;
	background-position-y: center;
	background-attachment: fixed;
	color: #eee;

div.main
{

}

{

{

		'Roboto Slab',
		'Palatino Linotype',
		'Palatino',
		'Palladio',
		'URW Palladio L',
		'Book Antiqua',
		'Baskerville',
		'Bookman Old Style',
		'Bitstream Charter',
		'Nimbus Roman No9 L',
		'Garamond',

{
	font-family:
		'Fira Mono',
		'Consolas',
		'Andale Mono WT',
		'Andale Mono',
		'Lucida Console',
		'Lucida Sans Typewriter',
		'DejaVu Sans Mono',

{
	div.main

		width: 100vw;
	}

	div.footer
	{
		width: 50vw;
	}
}

@media (min-width: 800px)
{
	div.main
	{
		width: 780px;
	}

	div.footer
	{
		width: 390px;
	}
}

<div class="main">
